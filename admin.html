<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Seva Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .login-box {
            background: var(--bg-surface);
            padding: 3rem;
            border-radius: 1rem;
            border: 1px solid var(--border-glass);
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>
    <div class="login-box glass">
        <h2 class="text-center mb-4">Admin <span style="color: var(--accent-primary)">Login</span></h2>
        <form id="loginForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required>
            </div>
            <p id="error-msg" style="color: #ff3366; font-size: 0.9rem; display: none; margin-bottom: 1rem;">Username / Password salah!</p>
            <button type="submit" class="btn btn-primary w-100">Login to CMS</button>
            <a href="index.html" class="btn btn-secondary w-100 mt-3 text-center" style="display: block">Kembali ke Beranda</a>
        </form>
    </div>

    <script>
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbxnvSMGVq0VqEKg9mF2ZBnBY5AZawADTAtekMbT0OTofrJVvddCcy-8FJXrD6Oe4bAjWQ/exec';

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const uInput = document.getElementById('username').value;
            const pInput = document.getElementById('password').value;
            const btn = e.target.querySelector('button');
            const errorMsg = document.getElementById('error-msg');
            
            btn.innerText = "Memverifikasi...";
            btn.disabled = true;
            errorMsg.style.display = 'none';

            try {
                const resp = await fetch(GAS_URL + "?t=" + Date.now());
                const data = await resp.json();
                
                // Cari data admin di Drive, jika tidak ada pakai default seva/seva.123
                const admin = data.admin || { u: 'seva', p: 'seva.123' };

                if(uInput === admin.u && pInput === admin.p) {
                    localStorage.setItem('isAdmin', 'true');
                    window.location.href = 'index.html';
                } else {
                    errorMsg.style.display = 'block';
                }
            } catch(err) {
                // Fallback jika offline
                if(uInput === 'seva' && pInput === 'seva.123') {
                    localStorage.setItem('isAdmin', 'true');
                    window.location.href = 'index.html';
                } else {
                    errorMsg.style.display = 'block';
                }
            }
            btn.innerText = "Login to CMS";
            btn.disabled = false;
        });
    </script>
</body>
</html>
